name: Build Codie Bot Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Codie/**"
      - ".github/workflows/docker-build-codie.yml"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Codie image
        uses: docker/build-push-action@v6
        with:
          context: ./Codie
          file: ./Codie/Dockerfile
          push: true
          tags: ghcr.io/tgibs97/codie-discord-bot:latest